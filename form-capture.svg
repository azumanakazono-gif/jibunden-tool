<svg xmlns="http://www.w3.org/2000/svg" width="800" height="580" viewBox="0 0 800 580">
  <rect width="800" height="580" fill="#f8fafc" rx="8"/>
  <!-- Header bar -->
  <rect width="800" height="52" fill="#10b981" rx="8"/>
  <rect x="0" y="44" width="800" height="8" fill="#10b981"/>
  <text x="24" y="33" font-family="Helvetica Neue,Arial,sans-serif" font-size="16" font-weight="700" fill="white">お客様情報入力</text>

  <!-- Form fields -->
  <!-- 氏名 -->
  <text x="32" y="92" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#64748b">氏名（案件管理名でも可）</text>
  <rect x="32" y="100" width="340" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="48" y="123" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#94a3b8">例：山田 太郎</text>

  <!-- 住所 -->
  <text x="32" y="162" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#64748b">住所</text>
  <rect x="32" y="170" width="340" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="48" y="193" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#94a3b8">例：東京都渋谷区〇〇1-2-3</text>

  <!-- 電気使用量 -->
  <text x="32" y="232" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#64748b">電気使用量（月別・kWh）</text>
  <!-- Mini monthly grid -->
  <rect x="32" y="240" width="736" height="100" rx="6" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <!-- Month headers -->
  <text x="52" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">1月</text>
  <text x="112" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">2月</text>
  <text x="172" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">3月</text>
  <text x="232" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">4月</text>
  <text x="292" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">5月</text>
  <text x="352" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">6月</text>
  <text x="412" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">7月</text>
  <text x="472" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">8月</text>
  <text x="532" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">9月</text>
  <text x="588" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">10月</text>
  <text x="648" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">11月</text>
  <text x="708" y="260" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#475569">12月</text>
  <!-- Input boxes -->
  <rect x="38" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="98" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="158" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="218" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="278" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="338" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="398" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="458" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="518" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="578" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="638" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <rect x="698" y="268" width="52" height="28" rx="4" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1"/>
  <!-- Sample values -->
  <text x="52" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">380</text>
  <text x="124" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">350</text>
  <text x="184" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">320</text>
  <text x="244" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">280</text>
  <text x="304" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">260</text>
  <text x="364" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">300</text>
  <text x="424" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">420</text>
  <text x="484" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">450</text>
  <text x="544" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">390</text>
  <text x="604" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">370</text>
  <text x="664" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">400</text>
  <text x="724" y="287" font-family="Helvetica Neue,Arial,sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">410</text>
  <!-- Unit label -->
  <text x="764" y="308" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#94a3b8">kWh</text>

  <!-- 屋根情報 -->
  <text x="32" y="370" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#64748b">設置場所・屋根情報</text>
  <rect x="32" y="378" width="220" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="48" y="401" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#94a3b8">屋根の向き</text>
  <rect x="268" y="378" width="180" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="284" y="401" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#94a3b8">屋根勾配</text>

  <!-- パネル情報 -->
  <text x="32" y="440" font-family="Helvetica Neue,Arial,sans-serif" font-size="12" fill="#64748b">パネル・蓄電池</text>
  <rect x="32" y="448" width="340" height="36" rx="6" fill="white" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="48" y="471" font-family="Helvetica Neue,Arial,sans-serif" font-size="13" fill="#94a3b8">太陽光パネル容量（kW）</text>

  <!-- Submit button -->
  <rect x="32" y="510" width="200" height="44" rx="8" fill="#10b981"/>
  <text x="132" y="537" font-family="Helvetica Neue,Arial,sans-serif" font-size="15" font-weight="700" fill="white" text-anchor="middle">提案書を作成する</text>

  <!-- Watermark note -->
  <text x="400" y="570" font-family="Helvetica Neue,Arial,sans-serif" font-size="10" fill="#cbd5e1" text-anchor="middle">じぶん電気ツール — 入力フォームサンプル</text>
</svg>
